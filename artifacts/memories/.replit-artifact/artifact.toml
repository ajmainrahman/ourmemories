kind = "web"
previewPath = "/"
title = "Our Memories"
version = "1.0.0"
id = "artifacts/memories"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19122

[services.development]
run = "pnpm --filter @workspace/memories run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/memories", "run", "build" ]
publicDir = "artifacts/memories/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19122"
BASE_PATH = "/"
